services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ficabridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ficabridge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      # Override datasource URL so the app resolves "postgres" as the service name,
      # not localhost (which would be the local profile default)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ficabridge
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
