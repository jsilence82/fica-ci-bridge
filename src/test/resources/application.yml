spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  # Mirrors the pagination defaults in src/main/resources/application.yml. Kept here because the
  # test application.yml shadows the main one on the test classpath (same reason datasource/jpa/
  # flyway are redefined above), so InvoiceIntegrationTest's clamping assertions need it present.
  data:
    web:
      pageable:
        default-page-size: 50
        max-page-size: 200

sap:
  odata:
    base-url: http://localhost:8089
    username: wiremock
    password: wiremock
