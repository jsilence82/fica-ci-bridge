server:
  port: 8080

spring:
  application:
    name: fica-ci-bridge

  # Disable Open Session In View — avoids lazy-loading surprises across the HTTP boundary
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Jackson: use ISO-8601 strings for all date/time types, never timestamps
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # JAXB XML message converter — required for IDoc inbound and ALE acknowledgement responses
  mvc:
    converters:
      preferred-json-mapper: jackson

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Exposes /actuator/health/liveness and /actuator/health/readiness for Kubernetes
# probes. probes.enabled is set explicitly rather than relying on Spring Boot's
# "running in Kubernetes" auto-detection, so the same endpoints work identically
# outside a cluster too (e.g. docker-compose, local mvn run).
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Rate-limits outbound OData calls to the SAP FI-CA backend so this bridge cannot
# overwhelm it with concurrent traffic. These are starting values, not tuned figures —
# adjust limit-for-period / limit-refresh-period against real SAP throughput and
# timeout-duration against how long a caller can tolerate waiting for a permit.
resilience4j:
  ratelimiter:
    instances:
      sapOData:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 500ms


# Polling-based document sync — a demo-scale mechanism, not the production answer at real
# volume. See sync.DocumentSyncScheduler class-level Javadoc for known limitations
# (single-instance only, no distributed lock).
sync:
  poll-interval: PT1H
  initial-delay: PT1H

logging:
  level:
    com.ficabridge: INFO
    org.flywaydb: INFO
