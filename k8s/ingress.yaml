# Requires an ingress-nginx controller in the cluster. See README for the kind setup.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fica-ci-bridge
  namespace: fica-ci-bridge
spec:
  ingressClassName: nginx
  rules:
    - host: fica-ci-bridge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fica-ci-bridge
                port:
                  number: 80
