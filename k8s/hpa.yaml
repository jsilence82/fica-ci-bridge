# Requires metrics-server in the cluster. See README for the kind setup.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fica-ci-bridge
  namespace: fica-ci-bridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fica-ci-bridge
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
