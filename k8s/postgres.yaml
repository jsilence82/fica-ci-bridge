apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: fica-ci-bridge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: fica-ci-bridge
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate # single ReadWriteOnce volume — avoid two pods mounting it at once
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ficabridge
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fica-ci-bridge-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fica-ci-bridge-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata # avoid postgres complaining about a non-empty lost+found dir at the volume root
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "ficabridge"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "ficabridge"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fica-ci-bridge
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
