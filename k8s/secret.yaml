# Credentials for fica-ci-bridge's Postgres and WireMock (SAP OData stand-in) connections.
#
# These are the same throwaway local-dev values docker-compose.yml already uses
# (postgres/password, wiremock/wiremock) — not real secrets, which is why this manifest
# is safe to commit. A real deployment would source this Secret from a manager (e.g.
# External Secrets Operator, Sealed Secrets, or the cloud provider's secret store) rather
# than checking plaintext credentials into git, even low-value ones like these.
apiVersion: v1
kind: Secret
metadata:
  name: fica-ci-bridge-secrets
  namespace: fica-ci-bridge
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: password
  SAP_ODATA_USERNAME: wiremock
  SAP_ODATA_PASSWORD: wiremock
